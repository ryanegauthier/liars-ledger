<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Liar's Ledger - Report</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:         #0b1530;
      --bg-2:       #0f1b3a;
      --navy:       #121f44;
      --accent:     #c8a96e;
      --accent-dim: #9c7f4e;
      --alert:      #c73a25;
      --text:       #f1eedf;
      --text-muted: #c4c9d7;
      --text-faint: #5a5f6e;
      --border:     rgba(239,233,221,0.12);
      --border-acc: rgba(200,169,110,0.35);
      --green:      #1b8a84;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: "Inter", sans-serif;
      font-size: 0.8rem;
      min-height: 100vh;
    }

    .ll-header {
      background: var(--navy);
      border-bottom: 2px solid var(--accent);
      padding: 14px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .ll-brand {
      font-family: Oswald, sans-serif;
      font-size: 1.4rem;
      text-transform: uppercase;
      letter-spacing: -0.01em;
    }
    .ll-brand-liars  { color: var(--text); }
    .ll-brand-ledger { color: var(--accent); }

    .ll-header-meta {
      font-size: 0.56rem;
      color: var(--text-faint);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-align: right;
      line-height: 1.8;
    }

    .ll-page {
      max-width: 900px;
      margin: 0 auto;
      padding: 32px 24px 64px;
    }

    .ll-politician-header {
      border-top: 3px solid var(--accent);
      background: var(--bg-2);
      padding: 20px 24px;
      margin-bottom: 24px;
    }

    .ll-eyebrow {
      font-size: 0.58rem;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 4px;
    }

    .ll-name {
      font-family: Oswald, sans-serif;
      font-size: 2rem;
      text-transform: uppercase;
      letter-spacing: -0.02em;
      line-height: 1;
      margin-bottom: 6px;
    }

    .ll-party-pill {
      font-size: 0.7rem;
      font-family: "Inter", sans-serif;
      font-weight: 400;
      border: 1px solid;
      padding: 1px 5px;
      vertical-align: middle;
      position: relative;
      top: -4px;
    }
    .ll-party-D { color: #6a9abf; border-color: rgba(106,154,191,0.4); }
    .ll-party-R { color: #bf6a6a; border-color: rgba(191,106,106,0.4); }
    .ll-party-I { color: var(--text-faint); border-color: var(--text-faint); }

    .ll-party-meta {
      font-size: 0.64rem;
      color: var(--text-muted);
      letter-spacing: 0.06em;
      margin-bottom: 12px;
    }

    .ll-claim {
      padding: 12px 16px;
      border-left: 3px solid var(--accent-dim);
      background: rgba(0,0,0,0.2);
      font-style: italic;
      font-size: 0.82rem;
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 6px;
    }
    .ll-claim.ll-verdict-supported     { border-left-color: var(--green); background: rgba(27,138,132,0.08); }
    .ll-claim.ll-verdict-contradicted  { border-left-color: var(--alert); background: rgba(199,58,37,0.08); }
    .ll-claim.ll-verdict-mixed         { border-left-color: var(--accent); background: rgba(200,169,110,0.08); }
    .ll-claim.ll-verdict-insufficient  { border-left-color: var(--text-faint); }

    .ll-claim-label {
      font-size: 0.54rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 6px;
      display: block;
      font-style: normal;
    }
    .ll-claim-label.supported     { color: var(--green); }
    .ll-claim-label.contradicted  { color: var(--alert); }
    .ll-claim-label.mixed         { color: var(--accent); }
    .ll-claim-label.insufficient  { color: var(--text-faint); }

    .ll-verdict-explanation {
      display: block;
      font-size: 0.68rem;
      color: rgba(196,201,215,0.7);
      line-height: 1.5;
      margin-top: 8px;
      font-style: normal;
    }

    .ll-section { margin-bottom: 28px; }

    .ll-section-title {
      font-size: 0.58rem;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.14em;
      border-bottom: 1px solid var(--border-acc);
      padding-bottom: 6px;
      margin-bottom: 12px;
      display: flex;
      align-items: baseline;
      gap: 8px;
    }

    .ll-section-source {
      font-size: 0.48rem;
      color: var(--text-faint);
      letter-spacing: 0.08em;
    }

    .ll-row {
      display: grid;
      grid-template-columns: 90px 1fr;
      gap: 8px 16px;
      padding: 10px 0;
      border-top: 1px solid var(--border);
      align-items: start;
    }

    .ll-row-left {
      font-size: 0.7rem;
      font-weight: 500;
      line-height: 1.3;
    }

    .ll-row-right {
      font-size: 0.72rem;
      color: var(--text-muted);
      line-height: 1.5;
    }

    .ll-row-sub {
      font-size: 0.58rem;
      color: var(--text-faint);
      margin-top: 2px;
    }

    .ll-vote-yea       { color: var(--green); }
    .ll-vote-nay       { color: var(--alert); }
    .ll-vote-notvoting { color: var(--text-faint); }

    .ll-rating-row {
      display: grid;
      grid-template-columns: 56px 200px 1fr;
      gap: 8px 16px;
      padding: 8px 0;
      border-top: 1px solid var(--border);
      align-items: center;
    }

    .ll-rating-score {
      font-family: Oswald, sans-serif;
      font-size: 1.3rem;
      font-weight: 500;
      line-height: 1;
    }

    .ll-rating-year {
      font-size: 0.48rem;
      color: var(--text-faint);
      font-family: "Inter", sans-serif;
      font-weight: 400;
    }

    .ll-rating-bar-wrap {
      height: 4px;
      background: rgba(239,233,221,0.08);
      width: 100%;
      margin-top: 4px;
    }

    .ll-rating-bar { height: 4px; }

    .ll-rating-name {
      font-size: 0.72rem;
      color: var(--text);
      margin-bottom: 2px;
    }

    .ll-rating-cats {
      font-size: 0.56rem;
      color: var(--text-faint);
    }

    .ll-rating-text {
      font-size: 0.6rem;
      color: var(--text-faint);
      line-height: 1.5;
    }

    .ll-empty {
      font-size: 0.64rem;
      color: var(--text-faint);
      padding: 12px 0;
      font-style: italic;
    }

    a { color: var(--accent); text-decoration: none; }
    a:hover { color: var(--text); }

    .ll-footer {
      border-top: 1px solid var(--border);
      padding: 16px 32px;
      font-size: 0.52rem;
      color: var(--text-faint);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      display: flex;
      justify-content: space-between;
    }

    /* Shared button look across popup.html, report.html, and content.js's
       injected panel — all three now use this same gold/accent treatment
       as the single "upgrade to pro" standard (changed from an earlier
       red/gold split; gold won out). Same class name/rules kept in sync
       manually across all three files since none of them share a loaded
       stylesheet. If you change one, change all three. */
    .upgrade-to-pro-btn--accent {
      display: inline-block;
      padding: 8px 18px;
      background: var(--accent);
      color: var(--navy);
      font-family: "Inter", sans-serif;
      font-size: 0.66rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-decoration: none;
      width: fit-content;
      transition: background 0.18s ease;
    }
    .upgrade-to-pro-btn--accent:hover { background: var(--accent-dim); }

    .ll-error {
      max-width: 500px;
      margin: 80px auto;
      text-align: center;
      color: var(--text-faint);
    }
    .ll-error h2 {
      font-family: Oswald, sans-serif;
      font-size: 1.2rem;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: var(--border-acc); }
  </style>
</head>
<body>

  <div class="ll-header">
    <div class="ll-brand">
      <span class="ll-brand-liars">Liar's </span><span class="ll-brand-ledger">Ledger</span>
    </div>
    <div class="ll-header-meta">
      <div>congress.gov · govtrack · votesmart</div>
      <div id="reportDate"></div>
    </div>
  </div>

  <div class="ll-page" id="reportContent">
    <div class="ll-error">
      <h2>Loading report…</h2>
      <p>Retrieving data from session storage.</p>
    </div>
  </div>

    <div class="ll-footer">
    <span>congress.gov · official record · non-partisan</span>
    <span>Liar's Ledger v0.17.6</span>
  </div>

  <script src="src/config.js"></script>
  <script src="report.js"></script>
</body>
</html>
