<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Liar's Ledger</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:         #0f1b3a;
      --bg-2:       #0b1530;
      --navy:       #121f44;
      --accent:     #c8a96e;
      --accent-dim: #9c7f4e;
      --alert:      #c73a25;
      --text:       #f1eedf;
      --text-muted: #c4c9d7;
      --text-faint: #5a5f6e;
      --border:     rgba(239,233,221,0.12);
      --border-acc: rgba(200,169,110,0.35);
      --green:      #1b8a84;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 340px;
      background: var(--bg-2);
      color: var(--text);
      font-family: "Inter", sans-serif;
      font-size: 0.72rem;
      overflow: hidden;
    }

    /* ── Ticker ── */
    .ticker {
      min-height: 28px;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0 12px;
      border-bottom: 1px solid var(--border);
      color: rgba(241,238,223,0.45);
      font-size: 0.56rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .ticker-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--green);
      flex-shrink: 0;
      animation: pulse 2.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }

    /* ── Nav ── */
    .nav {
      min-height: 46px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 12px;
      background: var(--navy);
      border-bottom: 2px solid var(--border-acc);
    }

    .brand {
      font-family: Oswald, sans-serif;
      font-size: 1.05rem;
      letter-spacing: -0.01em;
      text-transform: uppercase;
      line-height: 1;
    }
    .brand-liars  { color: var(--text); }
    .brand-ledger { color: var(--accent); }

    .nav-right { display: flex; align-items: center; gap: 8px; }

    .active-label {
      font-size: 0.54rem;
      color: var(--text-faint);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .toggle { position: relative; width: 32px; height: 17px; }
    .toggle input { opacity: 0; width: 0; height: 0; position: absolute; }
    .slider {
      position: absolute; inset: 0;
      background: rgba(239,233,221,0.1);
      border-radius: 17px; cursor: pointer;
      transition: background 0.2s;
    }
    .slider::before {
      content: '';
      position: absolute;
      width: 11px; height: 11px;
      left: 3px; top: 3px;
      background: var(--text-faint);
      border-radius: 50%;
      transition: transform 0.2s, background 0.2s;
    }
    input:checked + .slider { background: rgba(27,138,132,0.25); border: 1px solid var(--green); }
    input:checked + .slider::before { transform: translateX(15px); background: var(--green); }

    /* ── Body ── */
    .body { padding: 10px 12px; }

    /* Scan - mirrors site .btn style (no border-radius, mono font, alert red) */
    .scan-btn {
      width: 100%;
      padding: 0.65rem 1rem;
      background: var(--alert);
      color: #fff6ef;
      border: none;
      border-top: 2px solid transparent;
      border-bottom: 2px solid transparent;
      font-family: "Inter", sans-serif;
      font-size: 0.64rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.18s ease;
      margin-bottom: 8px;
    }
    .scan-btn:hover:not(:disabled) { background: #d3482f; }
    .scan-btn:disabled {
      background: rgba(239,233,221,0.07);
      color: var(--text-faint);
      cursor: not-allowed;
    }

    /* Status */
    .status {
      font-size: 0.58rem;
      color: var(--text-faint);
      letter-spacing: 0.05em;
      min-height: 13px;
      margin-bottom: 8px;
      line-height: 1.5;
    }
    .status.working { color: var(--accent-dim); animation: blink 1.4s ease-in-out infinite; }
    .status.success { color: var(--green); }
    .status.error   { color: var(--alert); }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ── Ledger cards - mirrors .mockup-bar from site ── */
    .cards { display: flex; flex-direction: column; gap: 6px; margin-bottom: 8px; }

    .ledger-card {
      background: var(--navy);
      border-top: 2px solid var(--accent-dim);
      padding: 8px 10px 10px;
      animation: fadeUp 0.2s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(3px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-eyebrow {
      font-size: 0.54rem;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 1px;
    }

    .card-name {
      font-family: Oswald, sans-serif;
      font-size: 0.92rem;
      color: var(--text);
      text-transform: uppercase;
      letter-spacing: -0.01em;
      line-height: 1.1;
    }

    .party-pill {
      display: inline-block;
      font-family: "Inter", sans-serif;
      font-size: 0.48rem;
      letter-spacing: 0.1em;
      padding: 1px 5px;
      border: 1px solid;
      margin-left: 5px;
      vertical-align: middle;
      position: relative; top: -1px;
    }
    .party-D { color: #6a9abf; border-color: rgba(106,154,191,0.4); }
    .party-R { color: #bf6a6a; border-color: rgba(191,106,106,0.4); }
    .party-I { color: var(--text-faint); border-color: var(--text-faint); }

    .card-meta {
      font-size: 0.56rem;
      color: var(--text-muted);
      letter-spacing: 0.04em;
      margin: 2px 0 6px;
    }

    .card-claim {
      font-size: 0.6rem;
      color: #c4c9d7;
      line-height: 1.5;
      margin-bottom: 6px;
      padding: 5px 8px;
      border-left: 2px solid var(--accent-dim);
      background: rgba(0,0,0,0.2);
      font-style: italic;
    }

    .bill-row {
      display: flex;
      align-items: baseline;
      gap: 6px;
      padding: 4px 0;
      border-top: 1px solid var(--border);
    }

    .bill-id {
      font-size: 0.56rem;
      color: var(--accent);
      white-space: nowrap;
      flex-shrink: 0;
      letter-spacing: 0.04em;
    }

    .bill-title {
      font-size: 0.58rem;
      color: var(--text-muted);
      line-height: 1.35;
      flex: 1;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .bill-link {
      font-size: 0.56rem;
      color: #e8c98f;
      text-decoration: none;
      flex-shrink: 0;
    }
    .bill-link:hover { color: var(--accent); }

    .no-bills {
      font-size: 0.56rem;
      color: var(--text-faint);
      padding: 4px 0;
      border-top: 1px solid var(--border);
    }

    /* ── Scan info bar ── */
    .scan-info {
      font-size: 0.52rem;
      color: var(--text-faint);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 8px;
      min-height: 14px;
    }
    .scan-info.pro     { color: var(--green); }
    .scan-info.low     { color: var(--accent); }
    .scan-info.exhausted { color: var(--alert); }

    /* ── Upgrade prompt ── */
    .upgrade-prompt {
      background: rgba(199,58,37,0.08);
      border-left: 3px solid var(--alert);
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .upgrade-heading {
      font-family: Oswald, sans-serif;
      font-size: 0.88rem;
      color: var(--text);
      text-transform: uppercase;
      letter-spacing: -0.01em;
    }
    .upgrade-body {
      font-size: 0.56rem;
      color: var(--text-muted);
      line-height: 1.5;
    }
    .upgrade-btn {
      display: inline-block;
      padding: 4px 10px;
      background: var(--alert);
      color: #fff6ef;
      font-family: "Inter", sans-serif;
      font-size: 0.52rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      text-decoration: none;
      width: fit-content;
      margin-top: 2px;
    }
    .upgrade-btn:hover { background: #d3482f; }

    /* ── Footer ── */
    .popup-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 5px 12px 7px;
      border-top: 1px solid var(--border);
      background: var(--bg-2);
    }

    .footer-source, .footer-version {
      font-size: 0.5rem;
      color: var(--text-faint);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    ::-webkit-scrollbar { width: 2px; }
    ::-webkit-scrollbar-thumb { background: var(--border-acc); }
    ::-webkit-scrollbar-track { background: transparent; }
  </style>
</head>
<body>

  <div class="ticker">
    <span class="ticker-dot"></span>
    <span id="tickerText">Source: congress.gov · 119th Congress · Official Record</span>
  </div>

  <div class="nav">
    <div class="brand">
      <span class="brand-liars">Liar's </span><span class="brand-ledger">Ledger</span>
    </div>
    <div class="nav-right">
      <span class="active-label">Active</span>
      <label class="toggle">
        <input type="checkbox" id="enableToggle" checked>
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <div class="body">
    <button class="scan-btn" id="scanBtn">Scan This Page</button>
    <div class="scan-info" id="scanInfo"></div>
    <div class="status" id="status">Ready.</div>
    <div class="cards" id="cardsContainer"></div>
  </div>

  <div class="popup-footer">
    <span class="footer-source">congress.gov · official record</span>
    <span class="footer-version" id="versionLabel">v0.13.0</span>
  </div>

  <script src="src/config.js"></script>
  <script src="popup.js"></script>
</body>
</html>
