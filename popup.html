<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VoteCheck</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 240px;
      font-family: 'Georgia', serif;
      background: #0f1117;
      color: #e8e4d9;
      padding: 16px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
      border-bottom: 1px solid #2a2d35;
      padding-bottom: 12px;
    }

    .logo {
      width: 24px;
      height: 24px;
      background: #c8a96e;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
    }

    h1 {
      font-size: 15px;
      font-weight: normal;
      letter-spacing: 0.05em;
      color: #c8a96e;
    }

    .status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .status-label {
      font-size: 12px;
      color: #8a8680;
    }

    /* Toggle switch */
    .toggle {
      position: relative;
      width: 40px;
      height: 22px;
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      inset: 0;
      background: #2a2d35;
      border-radius: 22px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .slider::before {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      left: 3px;
      top: 3px;
      background: #8a8680;
      border-radius: 50%;
      transition: transform 0.2s, background 0.2s;
    }

    input:checked + .slider {
      background: #1e3a2f;
    }

    input:checked + .slider::before {
      transform: translateX(18px);
      background: #4caf82;
    }

    .info {
      font-size: 11px;
      color: #5a5855;
      line-height: 1.5;
    }

    .version {
      margin-top: 12px;
      font-size: 10px;
      color: #3a3835;
      text-align: right;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">✓</div>
    <h1>VoteCheck</h1>
  </div>

  <div class="status-row">
    <span class="status-label">Active on this page</span>
    <label class="toggle">
      <input type="checkbox" id="enableToggle" checked>
      <span class="slider"></span>
    </label>
  </div>

  <p class="info">
    Detects politicians in articles and surfaces their voting records in real time.
  </p>

  <div class="version">v0.1.0 — skeleton</div>

  <script src="popup.js"></script>
</body>
</html>
