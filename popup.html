<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Liar's Ledger</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:         #0f1b3a;
      --bg-2:       #0b1530;
      --navy:       #121f44;
      --accent:     #c8a96e;
      --accent-dim: #9c7f4e;
      --alert:      #c73a25;
      --text:       #f1eedf;
      --text-muted: #c4c9d7;
      --text-faint: #5a5f6e;
      --border:     rgba(239,233,221,0.12);
      --border-acc: rgba(200,169,110,0.35);
      --green:      #1b8a84;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    /* Readability pass for demo use: body width about 1.7x (278px to
       475px), base font size about 1.5x (0.6rem to 0.9rem). Every other
       size below scales from these same two ratios, not just the few
       spots from the earlier partial pass. */
    body {
      width: 475px;
      background: var(--bg-2);
      color: var(--text);
      font-family: "Inter", sans-serif;
      font-size: 0.9rem;
      overflow: hidden;
    }

    /* Ticker */
    .ticker {
      min-height: 38px;
      display: flex;
      align-items: center;
      gap: 0.83rem;
      padding: 0 16px;
      border-bottom: 1px solid var(--border);
      color: rgba(241,238,223,0.45);
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .ticker-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--green);
      flex-shrink: 0;
      animation: pulse 2.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }

    /* Nav */
    .nav {
      min-height: 62px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      background: var(--navy);
      border-bottom: 3px solid var(--border-acc);
    }

    .brand {
      font-family: Oswald, sans-serif;
      font-size: 1.42rem;
      letter-spacing: -0.01em;
      text-transform: uppercase;
      line-height: 1;
    }
    .brand-liars  { color: var(--text); }
    .brand-ledger { color: var(--accent); }

    .nav-right { display: flex; align-items: center; gap: 11px; }

    .active-label {
      font-size: 0.68rem;
      color: var(--text-faint);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .toggle { position: relative; width: 41px; height: 21px; }
    .toggle input { opacity: 0; width: 0; height: 0; position: absolute; }
    .slider {
      position: absolute; inset: 0;
      background: rgba(239,233,221,0.1);
      border-radius: 21px; cursor: pointer;
      transition: background 0.2s;
    }
    .slider::before {
      content: '';
      position: absolute;
      width: 15px; height: 15px;
      left: 4px; top: 4px;
      background: var(--text-faint);
      border-radius: 50%;
      transition: transform 0.2s, background 0.2s;
    }
    input:checked + .slider { background: rgba(27,138,132,0.25); border: 1px solid var(--green); }
    input:checked + .slider::before { transform: translateX(18px); background: var(--green); }

    /* Body */
    .body { padding: 14px 16px; }

    /* Scan - mirrors site .btn style (no border-radius, mono font, alert red) */
    .scan-btn {
      width: 100%;
      padding: 0.92rem 1.42rem;
      background: var(--alert);
      color: #fff6ef;
      border: none;
      border-top: 3px solid transparent;
      border-bottom: 3px solid transparent;
      font-family: "Inter", sans-serif;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.18s ease;
      margin-bottom: 11px;
    }
    .scan-btn:hover:not(:disabled) { background: #d3482f; }
    .scan-btn:disabled {
      background: rgba(239,233,221,0.07);
      color: var(--text-faint);
      cursor: not-allowed;
    }

    .support-btn {
      width: 100%;
      padding: 0.72rem 1rem;
      margin-top: 8px;
      border: 1px solid rgba(200,169,110,0.35);
      background: rgba(200,169,110,0.12);
      color: var(--accent);
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
    }
    .support-btn:hover { background: rgba(200,169,110,0.2); }

    /* Status */
    .status {
      font-size: 0.72rem;
      color: var(--text-faint);
      letter-spacing: 0.05em;
      min-height: 18px;
      margin-bottom: 11px;
      line-height: 1.5;
    }
    .status.working { color: var(--accent-dim); animation: blink 1.4s ease-in-out infinite; }
    .status.success { color: var(--green); }
    .status.error   { color: var(--alert); }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* Ledger cards - mirrors .mockup-bar from site */
    .cards { display: flex; flex-direction: column; gap: 8px; margin-bottom: 11px; }

    .ledger-card {
      background: var(--navy);
      border-top: 3px solid var(--accent-dim);
      padding: 11px 14px 14px;
      animation: fadeUp 0.2s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(3px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-eyebrow {
      font-size: 0.67rem;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 2px;
    }

    .card-name {
      font-family: Oswald, sans-serif;
      font-size: 1.15rem;
      color: var(--text);
      text-transform: uppercase;
      letter-spacing: -0.01em;
      line-height: 1.1;
    }

    .party-pill {
      display: inline-block;
      font-family: "Inter", sans-serif;
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      padding: 2px 7px;
      border: 1px solid;
      margin-left: 7px;
      vertical-align: middle;
      position: relative; top: -1px;
    }
    .party-D { color: #6a9abf; border-color: rgba(106,154,191,0.4); }
    .party-R { color: #bf6a6a; border-color: rgba(191,106,106,0.4); }
    .party-I { color: var(--text-faint); border-color: var(--text-faint); }

    .card-meta {
      font-size: 0.7rem;
      color: var(--text-muted);
      letter-spacing: 0.04em;
      margin: 3px 0 8px;
    }

    .card-claim {
      font-size: 0.75rem;
      color: #c4c9d7;
      line-height: 1.5;
      margin-bottom: 8px;
      padding: 7px 11px;
      border-left: 3px solid var(--accent-dim);
      background: rgba(0,0,0,0.2);
      font-style: italic;
    }

    .bill-row {
      display: flex;
      align-items: baseline;
      gap: 8px;
      padding: 6px 0;
      border-top: 1px solid var(--border);
    }

    .bill-id {
      font-size: 0.7rem;
      color: var(--accent);
      white-space: nowrap;
      flex-shrink: 0;
      letter-spacing: 0.04em;
    }

    .bill-title {
      font-size: 0.72rem;
      color: var(--text-muted);
      line-height: 1.35;
      flex: 1;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .bill-link {
      font-size: 0.7rem;
      color: #e8c98f;
      text-decoration: none;
      flex-shrink: 0;
    }
    .bill-link:hover { color: var(--accent); }

    .no-bills {
      font-size: 0.7rem;
      color: var(--text-faint);
      padding: 6px 0;
      border-top: 1px solid var(--border);
    }

    /* Scan info bar */
    .scan-info {
      font-size: 0.65rem;
      color: var(--text-faint);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 11px;
      min-height: 18px;
    }
    .scan-info.pro     { color: var(--green); }
    .scan-info.low     { color: var(--accent); }
    .scan-info.exhausted { color: var(--alert); }

    /* Upgrade prompt */
    .upgrade-prompt {
      background: rgba(199,58,37,0.08);
      border-left: 4px solid var(--alert);
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .upgrade-heading {
      font-family: Oswald, sans-serif;
      font-size: 1.1rem;
      color: var(--text);
      text-transform: uppercase;
      letter-spacing: -0.01em;
    }
    .upgrade-body {
      font-size: 0.7rem;
      color: var(--text-muted);
      line-height: 1.5;
    }
    .upgrade-btn {
      display: inline-block;
      padding: 6px 13px;
      background: var(--alert);
      color: #fff6ef;
      font-family: "Inter", sans-serif;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      text-decoration: none;
      width: fit-content;
      margin-top: 3px;
    }
    .upgrade-btn:hover { background: #d3482f; }

    .upgrade-to-pro-btn {
      display: block;
      width: 100%;
      margin-top: 8px;
      padding: 0.72rem 1.42rem;
      background: var(--accent);
      color: var(--navy);
      border: none;
      border-top: 3px solid transparent;
      border-bottom: 3px solid transparent;
      font-family: "Inter", sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      text-decoration: none;
      text-align: center;
      cursor: pointer;
      transition: background 0.18s ease;
    }
    .upgrade-to-pro-btn:hover:not(:disabled) { background: var(--accent-dim); }
    .upgrade-to-pro-btn:disabled { background: rgba(200,169,110,0.45); cursor: not-allowed; }

    .upgrade-pro-msg {
      font-size: 0.62rem;
      margin-top: 5px;
      min-height: 14px;
      color: var(--text-faint);
    }
    .upgrade-pro-msg.ok    { color: var(--green); }
    .upgrade-pro-msg.error { color: var(--alert); }

    /* Token / account panel */
    .account-toggle {
      font-size: 0.65rem;
      color: var(--text-faint);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      background: none;
      border: none;
      cursor: pointer;
      padding: 6px 16px;
      width: 100%;
      text-align: left;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .account-toggle:hover { color: var(--accent); }
    .account-toggle .chevron { transition: transform 0.15s; display: inline-block; }
    .account-toggle.open .chevron { transform: rotate(180deg); }

    .account-panel {
      display: none;
      padding: 11px 16px 14px;
      border-top: 1px solid var(--border);
      background: var(--bg-2);
    }
    .account-panel.open { display: block; }

    .account-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .account-label {
      font-size: 0.62rem;
      color: var(--text-faint);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      flex-shrink: 0;
      width: 52px;
    }
    .account-token-id {
      font-family: "IBM Plex Mono", "Courier New", monospace;
      font-size: 0.62rem;
      color: var(--text-muted);
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .copy-btn {
      font-size: 0.65rem;
      color: var(--text-faint);
      background: none;
      border: 1px solid var(--border);
      padding: 4px 7px;
      cursor: pointer;
      flex-shrink: 0;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .copy-btn:hover { color: var(--accent); border-color: var(--border-acc); }
    .copy-btn.copied { color: var(--green); border-color: var(--green); }

    .restore-divider {
      font-size: 0.65rem;
      color: var(--text-faint);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin: 8px 0 6px;
    }
    .restore-row {
      display: flex;
      gap: 7px;
      align-items: center;
    }
    .restore-input {
      flex: 1;
      background: rgba(239,233,221,0.05);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: "IBM Plex Mono", "Courier New", monospace;
      font-size: 0.62rem;
      padding: 6px 8px;
      outline: none;
    }
    .restore-input:focus { border-color: var(--border-acc); }
    .restore-input::placeholder { color: var(--text-faint); }
    .restore-btn {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      background: none;
      border: 1px solid var(--border-acc);
      color: var(--accent);
      padding: 6px 11px;
      cursor: pointer;
      flex-shrink: 0;
    }
    .restore-btn:hover { background: rgba(200,169,110,0.1); }
    .restore-status {
      font-size: 0.62rem;
      margin-top: 6px;
      min-height: 16px;
    }
    .restore-status.ok    { color: var(--green); }
    .restore-status.error { color: var(--alert); }

    /* Footer */
    .popup-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 7px 16px 10px;
      border-top: 1px solid var(--border);
      background: var(--bg-2);
    }

    .footer-source, .footer-version {
      font-size: 0.67rem;
      color: var(--text-faint);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-thumb { background: var(--border-acc); }
    ::-webkit-scrollbar-track { background: transparent; }
  </style>
</head>
<body>

  <div class="ticker">
    <span class="ticker-dot"></span>
    <span id="tickerText">Source: congress.gov · 119th Congress · Official Record</span>
  </div>

  <div class="nav">
    <div class="brand">
      <span class="brand-liars">Liar's </span><span class="brand-ledger">Ledger</span>
    </div>
    <div class="nav-right">
      <span class="active-label">Active</span>
      <label class="toggle">
        <input type="checkbox" id="enableToggle" checked>
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <div class="body">
    <button class="scan-btn" id="scanBtn">Scan This Page</button>
    <div class="scan-info" id="scanInfo"></div>
    <div class="status" id="status">Ready.</div>
    <div class="cards" id="cardsContainer"></div>
  </div>

  <!-- Collapsible account panel: token display, copy, restore -->
  <button class="account-toggle" id="accountToggle" aria-expanded="false">
    <span class="chevron">▾</span> Account
  </button>
  <div class="account-panel" id="accountPanel" role="region">
    <div class="account-row">
      <span class="account-label">Token</span>
      <span class="account-token-id" id="tokenDisplay">-</span>
      <button class="copy-btn" id="copyTokenBtn" title="Copy install token">Copy</button>
    </div>
    <button id="upgradeProBtn" class="upgrade-to-pro-btn">Subscribe to Pro</button>
    <div class="upgrade-pro-msg" id="upgradeProMsg"></div>

    <div class="restore-divider">Restore Pro after reinstalling</div>
    <div style="font-size:0.65rem;color:var(--text-faint);line-height:1.5;margin-bottom:7px">
      Find your order number in the Square receipt email, paste it below.
    </div>
    <div class="restore-row">
      <input class="restore-input" id="restoreInput" type="text"
             placeholder="Square order # from your receipt…" autocomplete="off" spellcheck="false">
      <button class="restore-btn" id="restoreBtn">Restore</button>
    </div>
    <div class="restore-status" id="restoreStatus"></div>

    <div class="restore-divider">Troubleshooting</div>
    <button class="support-btn" id="supportBtn">Send Debug Log</button>
  </div>

  <div class="popup-footer">
    <span class="footer-source">congress.gov · official record</span>
    <span class="footer-version" id="versionLabel">v0.17.9</span>
  </div>

  <script src="src/config.js"></script>
  <script src="popup.js"></script>
</body>
</html>
